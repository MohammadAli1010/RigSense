name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      AUTH_SECRET: test-secret
      AUTH_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rigsense
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rigsense
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5433/rigsense_shadow

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript checks
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Build application
        run: npm run build
