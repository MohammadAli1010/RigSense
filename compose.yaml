services:
  postgres:
    image: postgres:16-alpine
    container_name: rigsense-postgres
    environment:
      POSTGRES_DB: rigsense
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - rigsense-postgres-data:/var/lib/postgresql/data

volumes:
  rigsense-postgres-data:
